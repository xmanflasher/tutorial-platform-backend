# ==================================
# Development Profile (dev)
# ==================================

# 1. Database Configuration (Local PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tutorial_db_backup}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres_password}

# 2. JPA / Hibernate (Development Mode)
# 自動建立/更新資料表，便於快速開發與測試
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. Security (Test Login)
# 本機開發預設開啟測試帳號登入功能
app.enable-test-login=true
