# ????
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================
# 2. JPA/Hibernate ??
# ==================================

# update: ????
spring.jpa.hibernate.ddl-auto=none

# ?? SQL
spring.jpa.show-sql=true

# ?????
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================================
# 3. ????
# ==================================

spring.jackson.deserialization.fail-on-unknown-properties=false
server.port=8080

# ==================================
# 4. Security / OAuth2 ??
# ==================================

# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:temp-google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:temp-google-secret}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Facebook (?????)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:temp-facebook-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:temp-facebook-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ==================================
# 5. Reverse Proxy / Render Settings
# ==================================
server.forward-headers-strategy=framework

