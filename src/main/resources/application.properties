# ==================================
# 2. JPA/Hibernate ??
# ==================================

# update: ????
spring.jpa.hibernate.ddl-auto=none

# ?? SQL
spring.jpa.show-sql=true

# ?????
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# ==================================
# 3. 伺服器配置
# ==================================
server.servlet.context-path=/api
spring.jackson.deserialization.fail-on-unknown-properties=false
server.port=8080

# ==================================
# 4. Security / OAuth2 ??
# ==================================

# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-secret}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# Facebook (暫未啟用)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:dummy-fb-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:dummy-fb-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.facebook.authorization-grant-type=authorization_code

# GitHub
spring.security.oauth2.client.registration.github.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_ID:dummy-github-id}
spring.security.oauth2.client.registration.github.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_SECRET:dummy-github-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.github.authorization-grant-type=authorization_code

# Discord
spring.security.oauth2.client.registration.discord.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID:dummy-discord-id}
spring.security.oauth2.client.registration.discord.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET:dummy-discord-secret}
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.provider=discord

spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# ==================================
# 5. Reverse Proxy / Render Settings
# ==================================
server.forward-headers-strategy=framework

# 前端網址 (生產環境務必由環境變數 FRONTEND_URL 提供)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# CORS 跨域白名單 (多個請用逗號分隔)
app.cors.allowed-patterns=${CORS_ALLOWED_PATTERNS:http://localhost:3000,https://*.vercel.app}

# JWT 密鑰 (生產環境務必由環境變數 JWT_SECRET 提供，嚴禁硬編碼預設值)
jwt.secret-key=${JWT_SECRET:this-is-a-very-long-and-secure-local-secret-key-32-chars}

# 測試登入開關 (Local 預設開啟，生產環境由環境變數 ENABLE_TEST_LOGIN 關閉)
app.enable-test-login=${ENABLE_TEST_LOGIN:true}

# API 速率限制 (Bucket4j)
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:100}
app.rate-limit.time-unit-minutes=${RATE_LIMIT_MINUTES:1}

