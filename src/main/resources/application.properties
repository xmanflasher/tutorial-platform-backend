spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================
# 2. JPA/Hibernate ??
# ==================================

# update: ????
spring.jpa.hibernate.ddl-auto=none

# ?? SQL
spring.jpa.show-sql=true

# ?????
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================================
# 3. ????
# ==================================

spring.jackson.deserialization.fail-on-unknown-properties=false
server.port=8080

# ==================================
# 4. Security / OAuth2 ??
# ==================================

# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Facebook (жҡ«жңӘе•ҹз”Ё)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ==================================
# 5. Reverse Proxy / Render Settings
# ==================================
server.forward-headers-strategy=framework

# еүҚз«Ҝз¶ІеқҖ (з”ҹз”ўз’°еўғеӢҷеҝ…з”ұз’°еўғи®Ҡж•ё FRONTEND_URL жҸҗдҫӣ)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# CORS и·ЁеҹҹзҷҪеҗҚе–® (еӨҡеҖӢи«Ӣз”ЁйҖ—иҷҹеҲҶйҡ”)
app.cors.allowed-patterns=${CORS_ALLOWED_PATTERNS:http://localhost:3000,https://*.vercel.app}

# JWT еҜҶй‘° (з”ҹз”ўз’°еўғеӢҷеҝ…з”ұз’°еўғи®Ҡж•ё JWT_SECRET жҸҗдҫӣпјҢеҡҙзҰҒзЎ¬з·Ёзўјй җиЁӯеҖј)
jwt.secret-key=${JWT_SECRET}